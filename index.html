<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Rifa Colombiana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        .grid-numbers {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
        }

        .export-grid-numbers {
            display: grid;
            grid-template-columns: repeat(10, 60px);
            gap: 8px;
        }

        .export-ticket-cell {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            line-height: 1;
            border-radius: 8px;
            border: 2px solid;
        }

        .ticket-btn {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 8px;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .ticket-btn:active {
            transform: scale(0.95);
        }

        .status-available {
            background-color: #f3f4f6;
            color: #374151;
            border: 2px solid #d1d5db;
        }

        .status-reserved {
            background-color: #fef08a;
            color: #854d0e;
            border: 2px solid #facc15;
        }

        .status-paid {
            background-color: #3b82f6;
            color: white;
            border: 2px solid #2563eb;
        }

        [v-cloak] {
            display: none;
        }

        @media print {
            body * {
                visibility: hidden;
            }

            #exportArea,
            #exportArea * {
                visibility: visible;
            }

            #exportArea {
                position: absolute;
                left: 0;
                top: 0;
            }
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen pb-20">

    <div id="app" class="max-w-4xl mx-auto px-4 py-8">
        <!-- Header / Configuración -->
        <header class="bg-white rounded-xl shadow-md p-6 mb-8">
            <h1 class="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                🇨🇴 Gestor de Rifa
            </h1>
            <div class="flex flex-col gap-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Premio</label>
                        <input type="text" id="prizeInput"
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border"
                            placeholder="Ej: Smart TV 55'">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Valor del Número ($)</label>
                        <input type="number" id="priceInput"
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border"
                            placeholder="Ej: 20000">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Fecha de la Rifa</label>
                        <input type="date" id="raffleDateInput"
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Lotería</label>
                        <input type="text" id="lotteryInput" list="lotteryList"
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border"
                            placeholder="Escriba para filtrar...">
                        <datalist id="lotteryList">
                            <option value="Bogotá">Lotería de Bogotá</option>
                            <option value="Cundinamarca">Lotería de Cundinamarca</option>
                            <option value="Santander">Lotería de Santander</option>
                            <option value="Medellín">Lotería de Medellín</option>
                            <option value="Córdoba">Lotería de Córdoba</option>
                            <option value="Risaralda">Lotería de Risaralda</option>
                            <option value="Cauca">Lotería del Cauca</option>
                            <option value="Nariño">Lotería de Nariño</option>
                            <option value="Valle">Lotería del Valle</option>
                            <option value="Quindío">Lotería del Quindío</option>
                            <option value="Huila">Lotería del Huila</option>
                            <option value="Tolima">Lotería del Tolima</option>
                            <option value="Meta">Lotería del Meta</option>
                            <option value="Boyacá">Lotería de Boyacá</option>
                            <option value="Antioquia">Lotería de Antioquia</option>
                            <option value="Caldas">Lotería de Caldas</option>
                            <option value="Atlántico">Lotería del Atlántico</option>
                            <option value="Bolívar">Lotería de Bolívar</option>
                            <option value="Sucre">Lotería de Sucre</option>
                            <option value="Magdalena">Lotería del Magdalena</option>
                            <option value="Cesar">Lotería del Cesar</option>
                            <option value="La Guajira">Lotería de La Guajira</option>
                            <option value="Norte de Santander">Lotería de Norte de Santander</option>
                            <option value="Chocó">Lotería del Chocó</option>
                            <option value="Caquetá">Lotería del Caquetá</option>
                            <option value="Putumayo">Lotería de Putumayo</option>
                            <option value="Amazonas">Lotería del Amazonas</option>
                            <option value="Guainía">Lotería del Guainía</option>
                            <option value="Vaupés">Lotería del Vaupés</option>
                            <option value="Vichada">Lotería del Vichada</option>
                            <option value="Arauca">Lotería de Arauca</option>
                            <option value="Casanare">Lotería de Casanare</option>
                        </datalist>
                    </div>
                </div>
            </div>
            <button onclick="saveSettings()"
                class="mt-4 w-full md:w-auto bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700 transition">
                Guardar Configuración
            </button>
        </header>

        <!-- Resumen y Estadísticas -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-4 rounded-lg shadow border-b-4 border-gray-300">
                <p class="text-gray-500 text-xs uppercase font-bold">Disponibles</p>
                <p id="statAvailable" class="text-2xl font-black text-gray-800">0</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-b-4 border-yellow-400">
                <p class="text-gray-500 text-xs uppercase font-bold">Reservados</p>
                <p id="statReserved" class="text-2xl font-black text-yellow-600">0</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-b-4 border-blue-500">
                <p class="text-gray-500 text-xs uppercase font-bold">Pagados</p>
                <p id="statPaid" class="text-2xl font-black text-blue-600">0</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-b-4 border-green-500">
                <p class="text-gray-500 text-xs uppercase font-bold">Recaudado</p>
                <p id="statTotal" class="text-2xl font-black text-green-600">$0</p>
            </div>
        </div>

        <!-- Cuadrícula de Números -->
        <div class="flex justify-end mb-4">
            <button onclick="exportToImage()"
                class="bg-green-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-green-700 transition flex items-center gap-2">
                📥 Exportar Imagen
            </button>
        </div>
        <div id="ticketGrid" class="grid-numbers">
            <!-- Los números se generarán aquí con JS -->
        </div>

        <!-- Área oculta para exportar -->
        <div id="exportArea" class="bg-white p-8 hidden">
            <div id="exportHeader" class="mb-6 border-b-2 border-gray-300 pb-4">
                <h2 class="text-2xl font-bold text-gray-800 text-center mb-2" id="exportTitle">GRAN RIFA</h2>
                <p class="text-lg text-gray-600 text-center" id="exportDateText"></p>

                <div class="flex justify-between mt-6 px-4">
                    <!-- Left: Medios de Pago -->
                    <div class="text-center">
                        <p class="font-bold text-gray-800 mb-3">MEDIOS DE PAGO</p>

                        <div class="mb-3">
                            <img src="icon.png" alt="Efectivo" width="32" height="32" class="mx-auto mb-1" />
                            <p class="text-sm text-gray-600">Efectivo</p>
                        </div>

                        <div class="mb-3">
                            <img src="transfer_icon.png" alt="Transferencia" width="32" height="32"
                                class="mx-auto mb-1" />
                            <p class="text-sm text-gray-600">Transferencia</p>
                        </div>

                        <p class="text-xs text-gray-500 mt-2">No olvides mandar tu<br>comprobante de pago</p>
                    </div>

                    <!-- Center: Logo -->
                    <div class="flex items-center justify-center px-4">
                        <img src="logo.png" alt="Logo Rifa" class="w-60 h-auto object-contain" />
                    </div>

                    <!-- Right: Lottery Info -->
                    <div class="text-center">
                        <p class="font-bold text-gray-800 mb-3">LOTERÍA</p>
                        <p class="text-lg text-gray-700 mb-3" id="exportLotteryName"></p>
                        <p class="text-gray-600" id="exportTicketPrice"></p>
                        <p class="text-gray-600" id="exportPrizeText"></p>
                    </div>
                </div>
            </div>
            <div id="exportGrid" class="export-grid-numbers bg-white p-4"></div>
        </div>
    </div>

    <!-- Modal de Gestión -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-800">Número <span id="modalTicketNum"
                        class="text-blue-600">--</span></h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nombre del Comprador</label>
                    <input type="text" id="buyerName"
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Teléfono</label>
                    <input type="tel" id="buyerPhone"
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Estado</label>
                    <select id="ticketStatus"
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
                        <option value="available">Disponible</option>
                        <option value="reserved">Reservado</option>
                        <option value="paid">Pagado</option>
                    </select>
                </div>
            </div>

            <div class="mt-6 flex flex-col gap-2">
                <button onclick="saveTicket()"
                    class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition">
                    Guardar Cambios
                </button>
                <button onclick="clearTicket()"
                    class="w-full bg-red-50 text-red-600 py-2 rounded-lg font-bold hover:bg-red-100 transition">
                    Liberar Número
                </button>
            </div>
        </div>
    </div>

    <script>
        let appData = {
            settings: { prize: '', ticket_price: 0, raffle_date: '', lottery: '' },
            tickets: []
        };
        let currentTicket = null;

        async function init() {
            try {
                const response = await fetch('api.php?action=get_all');
                appData = await response.json();

                document.getElementById('prizeInput').value = appData.settings.prize;
                document.getElementById('priceInput').value = appData.settings.ticket_price;
                document.getElementById('raffleDateInput').value = appData.settings.raffle_date || '';
                document.getElementById('lotteryInput').value = appData.settings.lottery || '';

                renderGrid();
                updateStats();
                updateExportHeader();
            } catch (error) {
                console.error('Error al cargar datos:', error);
                alert('No se pudo conectar con el servidor. Verifica tu configuración de base de datos.');
            }
        }

        function renderGrid() {
            const grid = document.getElementById('ticketGrid');
            grid.innerHTML = '';

            appData.tickets.forEach(ticket => {
                const btn = document.createElement('button');
                btn.className = `ticket-btn status-${ticket.status} shadow-sm`;
                btn.textContent = ticket.ticket_number;
                btn.onclick = () => openModal(ticket);
                grid.appendChild(btn);
            });
        }

        function updateStats() {
            const available = appData.tickets.filter(t => t.status === 'available').length;
            const reserved = appData.tickets.filter(t => t.status === 'reserved').length;
            const paid = appData.tickets.filter(t => t.status === 'paid').length;
            const totalRecaudado = paid * appData.settings.ticket_price;

            document.getElementById('statAvailable').textContent = available;
            document.getElementById('statReserved').textContent = reserved;
            document.getElementById('statPaid').textContent = paid;
            document.getElementById('statTotal').textContent = new Intl.NumberFormat('es-CO', {
                style: 'currency',
                currency: 'COP',
                maximumFractionDigits: 0
            }).format(totalRecaudado);
        }

        async function saveSettings() {
            const prize = document.getElementById('prizeInput').value;
            const price = document.getElementById('priceInput').value;
            const raffleDate = document.getElementById('raffleDateInput').value;
            const lottery = document.getElementById('lotteryInput').value;

            const response = await fetch('api.php', {
                method: 'POST',
                body: JSON.stringify({
                    action: 'update_settings',
                    prize: prize,
                    ticket_price: price,
                    raffle_date: raffleDate,
                    lottery: lottery
                })
            });

            if (response.ok) {
                appData.settings.prize = prize;
                appData.settings.ticket_price = price;
                appData.settings.raffle_date = raffleDate;
                appData.settings.lottery = lottery;
                updateStats();
                updateExportHeader();
                alert('Configuración guardada');
            }
        }

        function openModal(ticket) {
            currentTicket = ticket;
            document.getElementById('modalTicketNum').textContent = ticket.ticket_number;
            document.getElementById('buyerName').value = ticket.buyer_name || '';
            document.getElementById('buyerPhone').value = ticket.buyer_phone || '';
            document.getElementById('ticketStatus').value = ticket.status;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        async function saveTicket() {
            const status = document.getElementById('ticketStatus').value;
            const name = document.getElementById('buyerName').value;
            const phone = document.getElementById('buyerPhone').value;

            const response = await fetch('api.php', {
                method: 'POST',
                body: JSON.stringify({
                    action: 'update_ticket',
                    ticket_number: currentTicket.ticket_number,
                    status: status,
                    buyer_name: name,
                    buyer_phone: phone
                })
            });

            if (response.ok) {
                const index = appData.tickets.findIndex(t => t.ticket_number === currentTicket.ticket_number);
                appData.tickets[index] = {
                    ...currentTicket,
                    status: status,
                    buyer_name: name,
                    buyer_phone: phone
                };
                renderGrid();
                updateStats();
                closeModal();
            }
        }

        async function clearTicket() {
            if (!confirm('¿Seguro que deseas liberar este número? Se borrarán los datos del comprador.')) return;

            const response = await fetch('api.php', {
                method: 'POST',
                body: JSON.stringify({
                    action: 'clear_ticket',
                    ticket_number: currentTicket.ticket_number
                })
            });

            if (response.ok) {
                const index = appData.tickets.findIndex(t => t.ticket_number === currentTicket.ticket_number);
                appData.tickets[index] = {
                    ...currentTicket,
                    status: 'available',
                    buyer_name: '',
                    buyer_phone: ''
                };
                renderGrid();
                updateStats();
                closeModal();
            }
        }

        // Cerrar modal al hacer clic fuera
        window.onclick = function (event) {
            const modal = document.getElementById('modal');
            if (event.target == modal) closeModal();
        }

        function renderExportGrid() {
            const exportGrid = document.getElementById('exportGrid');
            exportGrid.innerHTML = '';

            appData.tickets.forEach(ticket => {
                const cell = document.createElement('div');
                cell.className = 'export-ticket-cell';

                if (ticket.status === 'available') {
                    cell.style.backgroundColor = '#ffffff';
                    cell.style.borderColor = '#d1d5db';
                    cell.style.color = '#2563eb';
                    cell.textContent = ticket.ticket_number;
                } else {
                    cell.style.backgroundColor = '#16a34a';
                    cell.style.borderColor = '#15803d';
                    cell.style.color = '#ffffff';
                    cell.textContent = 'X';
                }

                exportGrid.appendChild(cell);
            });
        }

        function updateExportHeader() {
            let dateText = '';
            if (appData.settings.raffle_date) {
                const dateParts = appData.settings.raffle_date.split('-');
                if (dateParts.length === 3) {
                    const formattedDate = dateParts[2] + '/' + dateParts[1] + '/' + dateParts[0];
                    dateText = 'Juega el ' + formattedDate;
                }
            } else {
                dateText = 'Juega el --/--/----';
            }

            document.getElementById('exportTitle').innerHTML = 'GRAN RIFA<br><span class="text-lg font-normal">' + dateText + '</span>';
            document.getElementById('exportLotteryName').textContent = appData.settings.lottery || '-';
            document.getElementById('exportTicketPrice').textContent = 'Valor: $' + new Intl.NumberFormat('es-CO').format(appData.settings.ticket_price || 0);
            document.getElementById('exportPrizeText').textContent = 'Premio: ' + (appData.settings.prize || '-');
        }

        async function exportToImage() {
            updateExportHeader();
            renderExportGrid();

            const exportArea = document.getElementById('exportArea');
            exportArea.classList.remove('hidden');
            exportArea.style.position = 'absolute';
            exportArea.style.left = '-9999px';
            exportArea.style.top = '0';

            setTimeout(async () => {
                try {
                    const canvas = await html2canvas(exportArea, {
                        backgroundColor: '#ffffff',
                        scale: 2,
                        useCORS: true,
                        logging: false
                    });

                    const link = document.createElement('a');
                    link.download = 'rifa-' + (appData.settings.raffle_date || 'image') + '.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } catch (error) {
                    console.error('Error al exportar:', error);
                    alert('Error al exportar la imagen');
                } finally {
                    exportArea.style.position = '';
                    exportArea.style.left = '';
                    exportArea.style.top = '';
                    exportArea.classList.add('hidden');
                }
            }, 200);
        }

        // Iniciar App
        init();
    </script>
</body>

</html>
